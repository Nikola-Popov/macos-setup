---
- name: Configure tools, dotfiles, and install runtimes
  hosts: local

  vars_prompt:
    - name: git_name
      prompt: "Enter your Git name"
      default: "{{ lookup('env', 'GIT_AUTHOR_NAME') | default('Your Name', true) }}"
      private: false

    - name: git_email
      prompt: "Enter your Git email"
      default: "{{ lookup('env', 'GIT_AUTHOR_EMAIL') | default('you@example.com', true) }}"
      private: false

  roles:
    - { role: git, tags: [git] }
    - { role: zsh, tags: [zsh] }
    - { role: oh_my_zsh, tags: [oh_my_zsh, zsh] }
    - { role: oh_my_posh, tags: [oh_my_posh, zsh] }
    - { role: nvim, tags: [nvim] }
    - { role: ghostty, tags: [ghostty] }
    - { role: vscode, tags: [vscode] }
    - { role: pyenv, tags: [pyenv, python] }
    - { role: btop, tags: [btop] }
    - { role: claude, tags: [claude] }
    - { role: worktrunk, tags: [worktrunk] }
    - { role: sdkman, tags: [sdkman, java, maven] }
