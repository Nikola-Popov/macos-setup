---
- name: Ensure btop config directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/btop"
    state: directory
    mode: "0755"

- name: Ensure btop config file exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/btop/btop.conf"
    state: touch
    mode: "0644"
    modification_time: preserve
    access_time: preserve

- name: Set btop theme to TTY
  ansible.builtin.lineinfile:
    path: "{{ ansible_user_dir }}/.config/btop/btop.conf"
    search_string: "color_theme ="
    line: 'color_theme = "TTY"'
