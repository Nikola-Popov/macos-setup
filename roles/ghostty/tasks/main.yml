---
- name: Create config to '$HOME/Library/Application\ Support/com.mitchellh.ghostty'
  ansible.builtin.copy:
    src: "{{ role_path }}/files/config"
    dest: "{{ macos_app_folder }}/com.mitchellh.ghostty"
    mode: "0644"

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.ssh"
    state: directory
    mode: "0700"

- name: Configure SSH TERM environment variable
  ansible.builtin.blockinfile:
    path: "{{ ansible_user_dir }}/.ssh/config"
    create: true
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - TERM config"
    block: |
      Host *
        SetEnv TERM=xterm-256color
