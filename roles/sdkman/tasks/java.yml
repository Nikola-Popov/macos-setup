---
- name: Get available SapMachine Java versions
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      {{ sdkman_init }} && sdk list java | grep -E '{{ sdkman_sapmachine_java_version }}.*sapmchn' | awk '{ print $NF }' | head -n 1
  register: sdkman_sapmachine_java_version_full
  changed_when: false
  failed_when: sdkman_sapmachine_java_version_full.rc != 0 or sdkman_sapmachine_java_version_full.stdout == ""

- name: Get list of installed Java versions
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      {{ sdkman_init }} && sdk list java | grep -E 'installed|local only' | awk '{ print $NF }'
  register: sdkman_installed_java
  changed_when: false
  failed_when: false

- name: Install requested latest SapMachine Java (e.g. 24.0.1-sapmchn)
  ansible.builtin.shell: |
    {{ sdkman_init }} && sdk install java {{ sdkman_sapmachine_java_version_full.stdout }}
  when:
    - sdkman_sapmachine_java_version_full.stdout != ""
    - sdkman_sapmachine_java_version_full.stdout not in sdkman_installed_java.stdout_lines
  changed_when: sdkman_sapmachine_java_version_full.stdout not in sdkman_installed_java.stdout_lines
